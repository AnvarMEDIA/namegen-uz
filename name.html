<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Детальный анализ — Naming · MAZE</title>
<meta name="description" content="Детальный AI-анализ имени бренда: значение, ассоциации, аудитория, сильные стороны. naming.maze.uz">
<link rel="canonical" href="https://naming.maze.uz/name/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;display:flex;flex-direction:column;font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}

:root{
  --bg:#0A0A0D;--bg2:#111114;--bg3:#17171B;--bg4:#1F1F24;
  --border:#1E1E22;--border2:#2A2A30;--border3:#3D3D44;
  --text:#F2F2EE;--text2:#A0A0A6;--text3:#5C5C63;--text4:#2E2E33;
  --accent:#C4FF3F;--accent2:#D9FF6E;--accent-deep:#A7E12B;--ink:#0A0A0D;
  --adim:rgba(196,255,63,.06);--aglow:rgba(196,255,63,.22);
  --red:#FF6B6B;--redbg:#1C1013;--redbr:#33181E;
  --radius:12px;--radius-sm:8px;--radius-lg:18px;--radius-xl:28px;
  --pad:clamp(20px,4vw,48px);
  --header-bg:rgba(10,10,13,.74);
  --uz-free-bg:rgba(196,255,63,.08);--uz-free-color:var(--accent);--uz-free-border:rgba(196,255,63,.30);
  --grid-line:rgba(255,255,255,.035);
  --shadow-card:0 18px 48px rgba(0,0,0,.42);
  --shadow-accent:0 8px 32px rgba(196,255,63,.20);
  --focus-ring:0 0 0 3px rgba(196,255,63,.18);
}
[data-theme="light"]{
  --bg:#FAFAF7;--bg2:#FFFFFF;--bg3:#F1F1EC;--bg4:#E5E5DF;
  --border:#E5E5DF;--border2:#D2D2CB;--border3:#A8A89F;
  --text:#0A0A0C;--text2:#4A4A4D;--text3:#8A8A82;--text4:#C8C8C0;
  --accent:#3D7A0E;--accent2:#4D8F18;--accent-deep:#2E5C0A;--ink:#FFFFFF;
  --adim:rgba(61,122,14,.07);--aglow:rgba(61,122,14,.18);
  --red:#B83A3A;--redbg:#FFF3F3;--redbr:#F0BFBF;
  --header-bg:rgba(250,250,247,.82);
  --uz-free-bg:rgba(61,122,14,.07);--uz-free-color:#2E5C0A;--uz-free-border:rgba(61,122,14,.30);
  --grid-line:rgba(0,0,0,.05);
  --shadow-card:0 12px 36px rgba(0,0,0,.08);
  --shadow-accent:0 8px 28px rgba(61,122,14,.20);
  --focus-ring:0 0 0 3px rgba(61,122,14,.18);
}
::selection{background:var(--accent);color:var(--ink)}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:64px 64px;mask-image:radial-gradient(ellipse at top,#000 30%,transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse at top,#000 30%,transparent 80%)}
body>*{position:relative;z-index:1}

/* ── Header ────────────────────────────────────────────── */
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:18px var(--pad);
  background:var(--header-bg);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
  border-bottom:1px solid var(--border)}
.logo{display:inline-flex;align-items:baseline;gap:10px;text-decoration:none;color:inherit;cursor:pointer}
.logo-mark{font-family:'Manrope',sans-serif;font-weight:900;font-size:24px;letter-spacing:-.04em}
.logo-slash{color:var(--text3);font-weight:300;font-size:22px}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text2);letter-spacing:.02em}
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:var(--bg2);border:1px solid var(--border2);color:var(--text2);font-family:'Manrope',sans-serif;font-size:13px;font-weight:500;border-radius:var(--radius-sm);text-decoration:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.back-btn:hover{color:var(--text);border-color:var(--border3);background:var(--bg3)}

/* ── Hero ──────────────────────────────────────────────── */
.hero-section{padding:56px var(--pad) 48px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both}
.hero-section::before{content:'';position:absolute;top:-160px;left:-120px;width:580px;height:580px;background:radial-gradient(circle,var(--aglow) 0%,transparent 60%);pointer-events:none;z-index:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.hero-inner{position:relative;z-index:1;max-width:1180px;margin:0 auto}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);background:var(--adim);border:1px solid var(--uz-free-border);padding:6px 12px;border-radius:100px;margin-bottom:18px}
.hero-eyebrow::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.hero-name-row{display:flex;align-items:baseline;gap:clamp(6px,1.2vw,14px);flex-wrap:wrap;margin-bottom:18px;line-height:1}
.hero-name{font-family:'Manrope',sans-serif;font-weight:800;font-size:clamp(40px,7vw,72px);letter-spacing:-.04em;color:var(--text);line-height:1;text-transform:lowercase}
.hero-ext{font-family:'JetBrains Mono',monospace;font-size:clamp(18px,2.4vw,28px);color:var(--accent);font-weight:500;letter-spacing:-.02em}
.hero-meta{display:flex;flex-direction:column;gap:8px;margin-bottom:28px;max-width:680px}
.hero-tagline-ru{font-size:clamp(17px,2vw,22px);color:var(--text2);line-height:1.5;font-weight:400}
.hero-tagline-uz{font-size:clamp(13px,1.4vw,16px);color:var(--text3);font-style:italic;line-height:1.45}
.hero-badge{display:inline-flex;align-items:center;gap:10px;padding:10px 18px;border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;border:1px solid;width:fit-content;letter-spacing:.02em}
.badge-free{background:var(--uz-free-bg);color:var(--uz-free-color);border-color:var(--uz-free-border)}
.badge-taken{background:var(--redbg);color:var(--red);border-color:var(--redbr)}
.badge-unknown{background:var(--bg3);color:var(--text3);border-color:var(--border2)}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;box-shadow:0 0 6px currentColor}

/* ── Content grid ──────────────────────────────────────── */
.content-grid{display:grid;grid-template-columns:1fr 360px;gap:18px;padding:36px var(--pad) 80px;align-items:start;max-width:1280px;margin:0 auto}
.content-main{display:flex;flex-direction:column;gap:16px}
.content-side{display:flex;flex-direction:column;gap:16px;position:sticky;top:88px}

/* ── Section cards ─────────────────────────────────────── */
.section{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:30px;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both;transition:border-color .2s}
.section:hover{border-color:var(--border3)}
.section-s2{animation-delay:.08s}
.section-s3{animation-delay:.14s}
.section-s4{animation-delay:.2s}
.sec-hd{display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:24px}
.sec-hd svg{color:var(--accent)}

/* ── AI Analysis ───────────────────────────────────────── */
.ai-trigger-btn{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:10px;background:var(--accent);color:var(--ink);border:1px solid var(--accent);border-radius:var(--radius);padding:18px 28px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:transform .15s,box-shadow .15s,background .15s}
.ai-trigger-btn:hover:not(:disabled){background:var(--accent2);box-shadow:0 8px 32px rgba(196,255,63,.22);transform:translateY(-1px)}
.ai-trigger-btn:active{transform:translateY(0)}
.ai-trigger-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none}
.ai-loader{display:flex;align-items:center;gap:14px;color:var(--text2);font-size:14px;padding:8px 0}
.ai-dots{display:flex;gap:5px}
.ai-dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);animation:dot .9s infinite}
.ai-dots span:nth-child(2){animation-delay:.15s}
.ai-dots span:nth-child(3){animation-delay:.3s}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.ai-results{display:none;flex-direction:column;gap:0}
.ai-results.visible{display:flex}
.ai-field{padding:24px 0;border-bottom:1px solid var(--border)}
.ai-field:first-child{padding-top:0}
.ai-field:last-child{border-bottom:none;padding-bottom:0}
.ai-lbl{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.ai-val{font-size:16px;color:var(--text);line-height:1.65;font-weight:400}
.ai-tags{display:flex;flex-wrap:wrap;gap:7px}
.ai-tag{background:var(--bg3);border:1px solid var(--border2);border-radius:100px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);letter-spacing:.02em}
.ai-tip{background:var(--adim);border:1px solid var(--card-fv-border,var(--uz-free-border));border-left:3px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0;padding:18px 22px;font-size:15px;color:var(--text);line-height:1.65}
.ai-error{color:var(--red);font-family:'JetBrains Mono',monospace;font-size:13px;padding:6px 0}

/* ── Chips ─────────────────────────────────────────────── */
.chips-col{display:flex;flex-direction:column;gap:8px}
.chip{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg3);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;width:100%;min-height:44px;cursor:default}
.chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--text3)}
.chip-icon{flex-shrink:0;opacity:.7;display:flex;align-items:center}
.chip-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.uz-free,.tg-free,.ig-free{background:var(--uz-free-bg);color:var(--uz-free-color);border-color:var(--uz-free-border)}
.uz-free .chip-dot,.tg-free .chip-dot,.ig-free .chip-dot{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.uz-taken,.tg-taken,.ig-taken{background:var(--bg3);color:var(--text3);border-color:var(--border2);opacity:.85}
.uz-taken .chip-dot,.tg-taken .chip-dot,.ig-taken .chip-dot{background:var(--red)}
.uz-checking,.tg-checking,.ig-checking,.ig-btn{background:var(--bg3);color:var(--text3);border-color:var(--border)}
.uz-checking .chip-dot,.tg-checking .chip-dot,.ig-checking .chip-dot{animation:pulseChip 1.2s ease infinite}
@keyframes pulseChip{0%,100%{opacity:.4}50%{opacity:1}}
.tg-free,.tg-taken,.ig-free,.ig-taken,.ig-btn{cursor:pointer}
.tg-free:hover,.tg-taken:hover,.ig-free:hover,.ig-taken:hover,.ig-btn:hover{transform:translateY(-1px);border-color:var(--border3)}

/* ── Share buttons ─────────────────────────────────────── */
.share-col{display:flex;flex-direction:column;gap:8px}
.share-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 18px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;border-radius:var(--radius);text-decoration:none;cursor:pointer;transition:all .15s;width:100%}
.share-btn:hover{color:var(--text);border-color:var(--border3);background:var(--bg4)}
.share-btn.copied{background:var(--accent);color:var(--ink);border-color:var(--accent)}
.share-tg{}
.share-tg:hover{color:var(--text);border-color:var(--accent)}

/* ── Error state ───────────────────────────────────────── */
.error-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px var(--pad);gap:18px;text-align:center;max-width:640px;margin:0 auto}
.error-icon{width:80px;height:80px;border-radius:50%;background:var(--bg2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text3)}
.error-title{font-family:'Manrope',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.025em;color:var(--text)}
.error-sub{font-size:15px;color:var(--text2);max-width:420px;line-height:1.6}
.error-link{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;background:var(--accent);color:var(--ink);font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-radius:100px;text-decoration:none;margin-top:6px;transition:transform .15s,box-shadow .15s,background .15s}
.error-link:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 10px 28px rgba(196,255,63,.22)}

/* ── Footer ────────────────────────────────────────────── */
footer{margin-top:48px;padding:32px var(--pad);border-top:1px solid var(--border);display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:16px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text2);max-width:1280px;margin-left:auto;margin-right:auto}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}

/* ── Responsive ────────────────────────────────────────── */
@media(max-width:960px){
  .content-grid{grid-template-columns:1fr;gap:16px;padding-top:32px}
  .content-side{position:static}
}
@media(max-width:600px){
  .hero-section{padding:56px var(--pad) 44px}
  .section{padding:22px}
  .error-title{font-size:24px}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <span class="logo-mark">MAZE</span><span class="logo-slash">/</span><span class="logo-sub">naming</span>
  </a>
  <a class="back-btn" href="/" id="back-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    К результатам
  </a>
</header>

<main id="main-content" style="flex:1;width:100%">
  <div id="page-body"></div>
</main>

<footer>
  <span>naming.maze.uz · 2026</span>
  <span>Часть экосистемы <a href="https://maze.uz" target="_blank" rel="noopener">MAZE ↗</a></span>
</footer>

<script>
// ── Theme ──────────────────────────────────────────────
(function(){
  var t=null;try{t=localStorage.getItem('ng_theme');}catch(e){}
  if(!t&&window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';
  document.documentElement.setAttribute('data-theme',t||'dark');
})();

var ICO_DOMAIN='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>';
var ICO_TG='<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M22.26 2.03 1.16 10.26c-1.41.57-1.4 1.36-.26 1.71l5.35 1.67 12.38-7.8c.58-.35 1.11-.16.67.22L7.79 16.2l-.4 5.68c.58 0 .84-.27 1.16-.58l2.79-2.71 5.8 4.28c1.07.59 1.84.29 2.1-.99l3.8-17.91c.4-1.58-.6-2.3-1.78-1.94z"/></svg>';
var ICO_IG='<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>';
var ICO_COPY='<svg width="14" height="14" viewBox="0 0 12 12" fill="none"><rect x="4" y="4" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M3 8H2a1 1 0 01-1-1V2a1 1 0 011-1h5a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>';
var ICO_TG_SHARE='<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M22.26 2.03 1.16 10.26c-1.41.57-1.4 1.36-.26 1.71l5.35 1.67 12.38-7.8c.58-.35 1.11-.16.67.22L7.79 16.2l-.4 5.68c.58 0 .84-.27 1.16-.58l2.79-2.71 5.8 4.28c1.07.59 1.84.29 2.1-.99l3.8-17.91c.4-1.58-.6-2.3-1.78-1.94z"/></svg>';

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cleanDomain(n){return(n||'').toLowerCase().replace(/[^a-z0-9-]/g,'').replace(/^-+|-+$/g,'');}
function cleanUser(n){return(n||'').toLowerCase().replace(/[^a-z0-9_.]/g,'');}

// ── Read entry ─────────────────────────────────────────
var urlId=(new URLSearchParams(window.location.search)).get('id')||'';
var entry=null;
if(urlId){try{entry=JSON.parse(localStorage.getItem('ng_name_'+urlId)||'null');}catch(e){}}

// ── Render ─────────────────────────────────────────────
var pb=document.getElementById('page-body');

if(!entry){
  pb.innerHTML=
    '<div class="error-wrap">'+
      '<div class="error-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>'+
      '<p class="error-title">Данные не найдены</p>'+
      '<p class="error-sub">Ссылка устарела или введена неправильно. Данные хранятся 7 дней в браузере, где было сгенерировано название.</p>'+
      '<a class="error-link" href="/">← Вернуться на главную</a>'+
    '</div>';
} else if(Date.now()>entry.expires_at){
  pb.innerHTML=
    '<div class="error-wrap">'+
      '<div class="error-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>'+
      '<p class="error-title">Ссылка устарела</p>'+
      '<p class="error-sub">Данные хранятся 7 дней. Сгенерируйте название снова, чтобы получить новую ссылку.</p>'+
      '<a class="error-link" href="/">Сгенерировать снова</a>'+
    '</div>';
} else {
  renderPage(entry);
}

function renderPage(e){
  var name=e.name||'';
  var tru=e.tagline_ru||'';
  var tuz=e.tagline_uz||'';
  var uzStatus=e.uz_status;
  var dn=cleanDomain(name);
  var un=cleanUser(name);

  document.title=name+'.uz — Naming by MAZE';

  var badgeHtml;
  if(uzStatus==='free')
    badgeHtml='<div class="hero-badge badge-free"><span class="badge-dot"></span>'+dn+'.uz — свободен</div>';
  else if(uzStatus==='taken')
    badgeHtml='<div class="hero-badge badge-taken"><span class="badge-dot"></span>'+dn+'.uz — занят</div>';
  else
    badgeHtml='<div class="hero-badge badge-unknown" id="badge-el"><span class="badge-dot"></span>'+dn+'.uz — проверяем...</div>';

  pb.innerHTML=

    // ── Hero ─────────────────────────────────────────
    '<div class="hero-section">'+
      '<div class="hero-inner">'+
        '<div class="hero-eyebrow">Детальный AI-анализ</div>'+
        '<div class="hero-name-row">'+
          '<span class="hero-name">'+esc(name)+'</span>'+
          '<span class="hero-ext">.uz</span>'+
        '</div>'+
        '<div class="hero-meta">'+
          (tru?'<div class="hero-tagline-ru">'+esc(tru)+'</div>':'')+
          (tuz?'<div class="hero-tagline-uz">'+esc(tuz)+'</div>':'')+
        '</div>'+
        badgeHtml+
      '</div>'+
    '</div>'+

    // ── 2-col grid ────────────────────────────────────
    '<div class="content-grid">'+

      // Left: AI analysis
      '<div class="content-main">'+
        '<div class="section" id="sec-ai">'+
          '<div class="sec-hd">'+
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>'+
            'AI‑анализ названия'+
          '</div>'+
          '<div id="ai-content">'+
            '<button class="ai-trigger-btn" id="ai-btn" onclick="runAnalysis()">'+
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>'+
              'Получить анализ от AI'+
            '</button>'+
          '</div>'+
        '</div>'+
      '</div>'+

      // Right sidebar: Domain/Social + Share
      '<div class="content-side">'+

        // Domain & Social
        '<div class="section section-s2">'+
          '<div class="sec-hd">'+
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>'+
            'Домен и соцсети'+
          '</div>'+
          '<div class="chips-col" id="chips-col">'+
            '<div class="chip uz-checking" id="chip-uz"><div class="chip-icon">'+ICO_DOMAIN+'</div><div class="chip-dot"></div><span class="chip-label">'+dn+'.uz — проверяем...</span></div>'+
            '<div class="chip tg-checking" id="chip-tg"><div class="chip-icon">'+ICO_TG+'</div><div class="chip-dot"></div><span class="chip-label">t.me/'+un+'</span></div>'+
            '<div class="chip ig-checking" id="chip-ig"><div class="chip-icon">'+ICO_IG+'</div><div class="chip-dot"></div><span class="chip-label">@'+un+'</span></div>'+
          '</div>'+
        '</div>'+

        // Share
        '<div class="section section-s3">'+
          '<div class="sec-hd">'+
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>'+
            'Поделиться'+
          '</div>'+
          '<div class="share-col">'+
            '<button class="share-btn" id="share-copy" onclick="shareCopy()">'+ICO_COPY+' Скопировать ссылку</button>'+
            '<a class="share-btn share-tg" id="share-tg" href="#" target="_blank" rel="noopener">'+ICO_TG_SHARE+' Открыть в Telegram</a>'+
          '</div>'+
        '</div>'+

      '</div>'+// end sidebar
    '</div>';// end grid

  // Telegram share URL
  document.getElementById('share-tg').href=
    'https://t.me/share/url?url='+encodeURIComponent(window.location.href)+
    '&text='+encodeURIComponent('Посмотри название: '+name+'.uz'+(tru?' — '+tru:''));

  // Domain checks
  if(!uzStatus){checkPageUz(dn);}
  else{updateChipUz(dn,{status:uzStatus});}
  checkPageTg(un);
  checkPageIg(un);
}

// ── Domain checks ──────────────────────────────────────
function checkPageUz(dn){
  fetch('/api/check-uz/'+encodeURIComponent(dn))
    .then(function(r){return r.json();})
    .then(function(d){updateChipUz(dn,d);updateBadge(dn,d);})
    .catch(function(){});
}
function checkPageTg(un){
  fetch('/api/check-tg/'+encodeURIComponent(un))
    .then(function(r){return r.json();})
    .then(function(d){updateChipTg(un,d);})
    .catch(function(){});
}
function checkPageIg(un){
  fetch('/api/check-ig/'+encodeURIComponent(un))
    .then(function(r){return r.json();})
    .then(function(d){updateChipIg(un,d);})
    .catch(function(){});
}

function updateBadge(dn,r){
  var el=document.getElementById('badge-el');if(!el)return;
  if(r.status==='free'){el.className='hero-badge badge-free';el.innerHTML='<span class="badge-dot"></span>'+dn+'.uz — свободен';}
  else if(r.status==='taken'){el.className='hero-badge badge-taken';el.innerHTML='<span class="badge-dot"></span>'+dn+'.uz — занят';}
}
function updateChipUz(dn,r){
  var el=document.getElementById('chip-uz');if(!el)return;
  if(r.status==='free'){el.className='chip uz-free';el.innerHTML='<div class="chip-icon">'+ICO_DOMAIN+'</div><div class="chip-dot"></div><span class="chip-label">'+dn+'.uz — свободен ✓</span>';}
  else if(r.status==='taken'){el.className='chip uz-taken';el.innerHTML='<div class="chip-icon">'+ICO_DOMAIN+'</div><div class="chip-dot"></div><span class="chip-label">'+dn+'.uz — занят</span>';}
  else{el.className='chip uz-checking';el.innerHTML='<div class="chip-icon">'+ICO_DOMAIN+'</div><div class="chip-dot"></div><span class="chip-label">'+dn+'.uz — ошибка</span>';}
}
function updateChipTg(un,r){
  var el=document.getElementById('chip-tg');if(!el)return;
  if(r.status==='free'){el.className='chip tg-free';el.innerHTML='<div class="chip-icon">'+ICO_TG+'</div><div class="chip-dot"></div><span class="chip-label">t.me/'+un+' — свободен ✓</span>';el.onclick=function(){window.open('https://t.me/'+un,'_blank');};}
  else if(r.status==='taken'){el.className='chip tg-taken';el.innerHTML='<div class="chip-icon">'+ICO_TG+'</div><div class="chip-dot"></div><span class="chip-label">t.me/'+un+' — занят</span>';el.onclick=function(){window.open('https://t.me/'+un,'_blank');};}
  else{el.className='chip tg-checking';el.innerHTML='<div class="chip-icon">'+ICO_TG+'</div><div class="chip-dot"></div><span class="chip-label">t.me/'+un+'</span>';el.onclick=function(){window.open('https://t.me/'+un,'_blank');};}
}
function updateChipIg(un,r){
  var el=document.getElementById('chip-ig');if(!el)return;
  if(r.status==='free'){el.className='chip ig-free';el.innerHTML='<div class="chip-icon">'+ICO_IG+'</div><div class="chip-dot"></div><span class="chip-label">@'+un+' — свободен ✓</span>';el.onclick=function(){window.open('https://www.instagram.com/'+un+'/','_blank');};}
  else if(r.status==='taken'){el.className='chip ig-taken';el.innerHTML='<div class="chip-icon">'+ICO_IG+'</div><div class="chip-dot"></div><span class="chip-label">@'+un+' — занят</span>';el.onclick=function(){window.open('https://www.instagram.com/'+un+'/','_blank');};}
  else{el.className='chip ig-btn';el.innerHTML='<div class="chip-icon">'+ICO_IG+'</div><div class="chip-dot"></div><span class="chip-label">@'+un+' — проверьте вручную</span>';el.onclick=function(){window.open('https://www.instagram.com/'+un+'/','_blank');};}
}

// ── AI Analysis ────────────────────────────────────────
function runAnalysis(){
  var btn=document.getElementById('ai-btn');
  var cont=document.getElementById('ai-content');
  if(!entry||!entry.name||!btn)return;
  btn.disabled=true;
  cont.innerHTML=
    '<div class="ai-loader">'+
      '<div class="ai-dots"><span></span><span></span><span></span></div>'+
      '<span>AI анализирует название…</span>'+
    '</div>';
  fetch('/api/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({mode:'analyse',name:entry.name})
  })
  .then(function(r){if(!r.ok)throw new Error('Ошибка API '+r.status);return r.json();})
  .then(function(d){renderAnalysis(d);})
  .catch(function(e){
    cont.innerHTML=
      '<p class="ai-error">Ошибка: '+esc(e.message)+'</p>'+
      '<button class="ai-trigger-btn" onclick="runAnalysis()" style="margin-top:14px">Повторить</button>';
  });
}

function renderAnalysis(d){
  var cont=document.getElementById('ai-content');if(!cont)return;
  var meaning=d.meaning||'';
  var assoc=d.associations||[];
  var audience=d.target_audience||'';
  var strengths=d.strengths||[];
  var tip=d.brand_tip||'';
  var similar=d.similar_brands||[];
  var html='<div class="ai-results visible">';

  if(meaning)
    html+='<div class="ai-field"><div class="ai-lbl">Значение</div><div class="ai-val">'+esc(meaning)+'</div></div>';
  if(assoc.length)
    html+='<div class="ai-field"><div class="ai-lbl">Образы и ассоциации</div><div class="ai-tags">'+assoc.map(function(a){return '<span class="ai-tag">'+esc(a)+'</span>';}).join('')+'</div></div>';
  if(audience)
    html+='<div class="ai-field"><div class="ai-lbl">Целевая аудитория</div><div class="ai-val">'+esc(audience)+'</div></div>';
  if(strengths.length)
    html+='<div class="ai-field"><div class="ai-lbl">Сильные стороны</div><div class="ai-tags">'+strengths.map(function(s){return '<span class="ai-tag">'+esc(s)+'</span>';}).join('')+'</div></div>';
  if(similar.length)
    html+='<div class="ai-field"><div class="ai-lbl">Похожие бренды</div><div class="ai-tags">'+similar.map(function(s){return '<span class="ai-tag">'+esc(s)+'</span>';}).join('')+'</div></div>';
  if(tip)
    html+='<div class="ai-field"><div class="ai-lbl">Совет по развитию</div><div class="ai-tip">'+esc(tip)+'</div></div>';

  html+='</div>';
  cont.innerHTML=html;
}

// ── Share ──────────────────────────────────────────────
function shareCopy(){
  var btn=document.getElementById('share-copy');
  navigator.clipboard.writeText(window.location.href).then(function(){
    btn.classList.add('copied');
    var orig=btn.innerHTML;
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Скопировано!';
    setTimeout(function(){btn.classList.remove('copied');btn.innerHTML=orig;},2200);
  }).catch(function(){});
}
</script>
